# MyWorld provider registry example.
# Put real secrets in environment variables, not here.

providers:
  openrouter:
    kind: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    models:
      # OpenRouter exposes many providers through one API key.
      # Use the live /api/v1/models endpoint for exact current IDs.
      - openai/gpt-5.1
      - anthropic/claude-sonnet-4.5
      - google/gemini-3-pro
      - x-ai/grok-4
      - deepseek/deepseek-chat

  deepseek:
    kind: openai_compatible
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro

  xai:
    kind: openai_compatible
    base_url: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
    models:
      - grok-4.20-reasoning
      - grok-4.20-non-reasoning
      - grok-4-1-fast-reasoning
      - grok-4-1-fast-non-reasoning

  openai:
    kind: openai_native
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    models:
      - gpt-5.1

  together:
    kind: openai_compatible
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    models:
      - openai/gpt-oss-120b
      - openai/gpt-oss-20b
      - deepseek-ai/DeepSeek-R1
      - deepseek-ai/DeepSeek-V3.1
      - Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8
      - meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      - meta-llama/Llama-3.3-70B-Instruct-Turbo

  fireworks:
    kind: openai_compatible
    base_url: https://api.fireworks.ai/inference/v1
    api_key_env: FIREWORKS_API_KEY
    models:
      - accounts/fireworks/models/kimi-k2-instruct-0905
      - accounts/fireworks/models/deepseek-v3p1
      - accounts/fireworks/models/qwen3-coder-480b-a35b-instruct
      - accounts/fireworks/models/llama-v3p1-70b-instruct

  groq:
    kind: openai_compatible
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    models:
      - openai/gpt-oss-120b
      - llama-3.1-8b-instant

  cerebras:
    kind: openai_compatible
    base_url: https://api.cerebras.ai/v1
    api_key_env: CEREBRAS_API_KEY
    models:
      - gpt-oss-120b
      - llama3.1-8b
      - qwen-3-235b-a22b-instruct-2507
      - zai-glm-4.7

  nebius:
    kind: openai_compatible
    base_url: https://api.studio.nebius.com/v1
    api_key_env: NEBIUS_API_KEY
    models:
      - deepseek-ai/DeepSeek-R1-0528
      - meta-llama/Llama-3.3-70B-Instruct
      - openai/gpt-oss-120B
      - Qwen/Qwen3-Coder-480B-A35B-Instruct

  huggingface_inference_providers:
    kind: hub_provider_gateway
    base_url: https://router.huggingface.co
    api_key_env: HF_TOKEN
    notes: "HF routes to multiple inference providers. Exact base URL/model route depends on HF task/provider API."

  replicate:
    kind: provider_specific
    api_key_env: REPLICATE_API_TOKEN
    notes: "Useful mainly for model demos, vision/image/video, and selected hosted open models."

local_runtimes:
  ollama:
    base_url_env: OLLAMA_HOST
    notes: "Install Ollama first. Good for quick local model experiments and llm-checker integration."
  vllm:
    notes: "Good for high-throughput OpenAI-compatible local serving; not installed yet."
  llama_cpp:
    notes: "Good for GGUF quantized models; not installed yet."
